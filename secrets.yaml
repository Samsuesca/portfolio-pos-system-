# =============================================================================
# Uniformes System v2 - Secrets Registry
# =============================================================================
# Tracks which secrets exist, their purpose, and rotation schedule.
# Does NOT contain secret values. This file IS committed to git.
#
# Audit with: python ../dev-tools/scripts/check-rotation.py secrets.yaml
# =============================================================================

project: uniformes-system-v2
vps: 104.156.247.226
domain: uniformesconsuelorios.com

secrets:
  SECRET_KEY:
    description: "JWT signing key (access + refresh tokens)"
    env_file: "backend/.env"
    rotation_days: 90
    last_rotated: null
    generate: "openssl rand -hex 32"

  DATABASE_URL:
    description: "PostgreSQL async connection string"
    env_file: "backend/.env"
    rotation_days: 180
    last_rotated: null
    contains_password: true

  REDIS_URL:
    description: "Redis connection (cache, sessions)"
    env_file: "backend/.env"
    rotation_days: null
    last_rotated: null

  RESEND_API_KEY:
    description: "Resend email service (notifications, portal invites)"
    env_file: "backend/.env"
    rotation_days: 365
    last_rotated: null
    provider_url: "https://resend.com/api-keys"

  WOMPI_PUBLIC_KEY:
    description: "Wompi payment gateway public key (frontend)"
    env_file: "backend/.env"
    rotation_days: 365
    last_rotated: null
    provider_url: "https://comercios.wompi.co"

  WOMPI_PRIVATE_KEY:
    description: "Wompi payment gateway private key (backend charges)"
    env_file: "backend/.env"
    rotation_days: 365
    last_rotated: null
    provider_url: "https://comercios.wompi.co"

  WOMPI_EVENTS_KEY:
    description: "Wompi webhook event signature verification"
    env_file: "backend/.env"
    rotation_days: 365
    last_rotated: null
    provider_url: "https://comercios.wompi.co"

  WOMPI_INTEGRITY_KEY:
    description: "Wompi payment integrity hash key"
    env_file: "backend/.env"
    rotation_days: 365
    last_rotated: null
    provider_url: "https://comercios.wompi.co"

  TELEGRAM_BOT_TOKEN:
    description: "Telegram bot for monitoring and sales alerts"
    env_file: "backend/.env"
    rotation_days: null
    last_rotated: null
    required_in_prod: false

  TELEGRAM_CHAT_ID:
    description: "Telegram chat/group ID for alerts"
    env_file: "backend/.env"
    rotation_days: null
    last_rotated: null
    required_in_prod: false
