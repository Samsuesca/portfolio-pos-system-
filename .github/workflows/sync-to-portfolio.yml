name: Sync to Portfolio

# Trigger: cuando se crea un tag (ej: v1.0.0, v2.1.3)
on:
  push:
    tags:
      - 'v*.*.*'  # Se ejecuta con tags como v1.0.0, v2.1.3, etc.
  workflow_dispatch:  # También permite ejecutarlo manualmente

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código de producción
      - name: Checkout production code
        uses: actions/checkout@v4
        with:
          path: production
          fetch-depth: 0

      # 2. Checkout del repositorio público (con tu token)
      - name: Checkout portfolio repository
        uses: actions/checkout@v4
        with:
          repository: Samsuesca/portfolio-pos-system-
          token: ${{ secrets.PORTFOLIO_REPO_TOKEN }}
          path: portfolio
          fetch-depth: 0

      # 3. Limpiar repositorio público
      - name: Clean portfolio repository
        run: |
          cd portfolio
          # Mantener .git pero eliminar todo lo demás
          shopt -s extglob
          rm -rf !(.git)
          cd ..

      # 4. Copiar archivos de producción
      - name: Copy production files
        run: |
          # Copiar todo excepto .git
          rsync -av --exclude='.git' production/ portfolio/

      # 5. Eliminar archivos sensibles
      - name: Remove sensitive files
        working-directory: portfolio
        run: |
          # Eliminar backups si existen
          rm -rf backups/ || true

          # Eliminar archivos .env (aunque estén en .gitignore)
          find . -name ".env" -type f ! -name ".env.example" -delete || true
          find . -name ".env.*" -type f ! -name ".env.example" -delete || true

          # Eliminar configs específicas de producción
          rm -f docker/.env || true
          rm -f backend/.env.production || true

          echo "Archivos sensibles eliminados"

      # 6. Ejecutar script de sanitización
      - name: Sanitize configuration files
        working-directory: portfolio
        run: |
          # Reemplazar dominio de producción
          find . -type f \( -name "*.py" -o -name "*.ts" -o -name "*.tsx" -o -name "*.md" -o -name "*.yml" \) \
            ! -path "*/node_modules/*" \
            ! -path "*/.git/*" \
            ! -path "*/venv/*" \
            ! -path "*/dist/*" \
            ! -path "*/build/*" \
            -exec sed -i 's/uniformesconsuelorios\.com/yourdomain.com/g' {} \; || true

          # Reemplazar email
          find . -type f \( -name "*.py" -o -name "*.ts" -o -name "*.tsx" -o -name "*.md" \) \
            ! -path "*/node_modules/*" \
            ! -path "*/.git/*" \
            ! -path "*/venv/*" \
            -exec sed -i 's/uniformesconsuelorios@gmail\.com/contact@example.com/g' {} \; || true

          # Reemplazar teléfonos
          find . -type f \( -name "*.py" -o -name "*.ts" -o -name "*.tsx" -o -name "*.md" \) \
            ! -path "*/node_modules/*" \
            ! -path "*/.git/*" \
            ! -path "*/venv/*" \
            -exec sed -i 's/\+57 310 599 7451/+57 300 123 4567/g' {} \; || true

          find . -type f \( -name "*.py" -o -name "*.ts" -o -name "*.tsx" -o -name "*.md" \) \
            ! -path "*/node_modules/*" \
            ! -path "*/.git/*" \
            ! -path "*/venv/*" \
            -exec sed -i 's/310 599 7451/300 123 4567/g' {} \; || true

          find . -type f \( -name "*.py" -o -name "*.ts" -o -name "*.tsx" -o -name "*.md" \) \
            ! -path "*/node_modules/*" \
            ! -path "*/.git/*" \
            ! -path "*/venv/*" \
            -exec sed -i 's/310-599-7451/300-123-4567/g' {} \; || true

          find . -type f \( -name "*.py" -o -name "*.ts" -o -name "*.tsx" -o -name "*.md" \) \
            ! -path "*/node_modules/*" \
            ! -path "*/.git/*" \
            ! -path "*/venv/*" \
            -exec sed -i 's/3105997451/3001234567/g' {} \; || true

          find . -type f \( -name "*.py" -o -name "*.ts" -o -name "*.tsx" -o -name "*.md" \) \
            ! -path "*/node_modules/*" \
            ! -path "*/.git/*" \
            ! -path "*/venv/*" \
            -exec sed -i 's/573105997451/573001234567/g' {} \; || true

          # Segundo teléfono
          find . -type f \( -name "*.py" -o -name "*.ts" -o -name "*.tsx" -o -name "*.md" \) \
            ! -path "*/node_modules/*" \
            ! -path "*/.git/*" \
            ! -path "*/venv/*" \
            -exec sed -i 's/313-485-6061/300-765-4321/g' {} \; || true

          echo "Configuracion sanitizada"

      # 7. Verificar que no quedan datos sensibles
      - name: Verify no sensitive data
        working-directory: portfolio
        run: |
          ERRORS=0

          echo "Verificando datos sensibles..."

          # Buscar dominio de producción
          if grep -r "uniformesconsuelorios\.com" . \
            --include="*.py" --include="*.ts" --include="*.tsx" --include="*.md" \
            --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=venv \
            --exclude-dir=dist --exclude-dir=build 2>/dev/null; then
            echo "ERROR: Dominio de produccion encontrado"
            ERRORS=$((ERRORS + 1))
          fi

          # Buscar teléfono
          if grep -r "3105997451\|310 599 7451\|310-599-7451" . \
            --include="*.py" --include="*.ts" --include="*.tsx" --include="*.md" \
            --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=venv \
            --exclude-dir=dist --exclude-dir=build 2>/dev/null; then
            echo "ERROR: Telefono de produccion encontrado"
            ERRORS=$((ERRORS + 1))
          fi

          # Buscar email
          if grep -r "uniformesconsuelorios@gmail\.com" . \
            --include="*.py" --include="*.ts" --include="*.tsx" --include="*.md" \
            --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=venv 2>/dev/null; then
            echo "ERROR: Email de produccion encontrado"
            ERRORS=$((ERRORS + 1))
          fi

          # Verificar que existen .env.example pero no .env
          if [ -f "backend/.env" ]; then
            echo "ERROR: backend/.env encontrado"
            ERRORS=$((ERRORS + 1))
          fi

          if [ ! -f "backend/.env.example" ]; then
            echo "ERROR: backend/.env.example falta"
            ERRORS=$((ERRORS + 1))
          fi

          if [ $ERRORS -gt 0 ]; then
            echo "Verificacion fallo con $ERRORS errores"
            exit 1
          fi

          echo "Verificacion exitosa - No hay datos sensibles"

      # 8. Commit y push al repositorio público
      - name: Commit and push to portfolio
        working-directory: portfolio
        run: |
          # Configurar Git
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

          # Extraer tag name si existe
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
          else
            TAG_NAME="manual-$(date +'%Y%m%d-%H%M%S')"
          fi

          # Agregar todos los cambios
          git add -A

          # Commit
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            git commit -m "chore: sync from production - ${TAG_NAME}" \
              -m "Released version ${TAG_NAME} from private repository" \
              -m "Date: $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          else
            git commit -m "chore: sync from production - manual" \
              -m "Manual sync triggered from GitHub Actions" \
              -m "Date: $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          fi

          # Push a main
          git push origin HEAD:main

          # Si es un tag, también pushearlo
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            git tag -f ${TAG_NAME}
            git push origin ${TAG_NAME} --force
            echo "Codigo y tag ${TAG_NAME} sincronizados"
          else
            echo "Codigo sincronizado (sin tag)"
          fi

      # 9. Notificaciones
      - name: Notify sync success
        if: success()
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            echo "Portfolio sincronizado exitosamente"
            echo "Tag: ${TAG_NAME}"
            echo "Ver repositorio: https://github.com/Samsuesca/portfolio-pos-system-"
            echo "Ver release: https://github.com/Samsuesca/portfolio-pos-system-/releases/tag/${TAG_NAME}"
          else
            echo "Portfolio sincronizado exitosamente (manual)"
            echo "Ver repositorio: https://github.com/Samsuesca/portfolio-pos-system-"
          fi

      - name: Notify sync failure
        if: failure()
        run: |
          echo "Error en sincronizacion del portfolio"
          echo "Ver logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
