name: Mobile Preview Build
on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'

jobs:
  build-ios-preview:
    name: Build iOS Preview
    type: build
    params:
      platform: ios
      profile: preview
      working_directory: mobile

  build-android-preview:
    name: Build Android Preview
    type: build
    params:
      platform: android
      profile: preview
      working_directory: mobile
